<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLN 인사이트</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif; background: #F6F5FF; margin: 0; }
  .sidebar { width: 220px; min-height: 100vh; background: #130D2A; position: fixed; top: 0; left: 0; z-index: 20; display: flex; flex-direction: column; padding: 20px 14px; }
  .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 4px 8px; margin-bottom: 28px; }
  .logo-mark { width: 28px; height: 28px; background: #7000FC; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #fff; flex-shrink: 0; }
  .logo-title { font-size: 14px; font-weight: 700; color: #fff; }
  .logo-sub { font-size: 10px; color: #5E5A71; }
  .nav-section { margin-bottom: 20px; }
  .nav-section-label { font-size: 9px; font-weight: 600; color: #5E5A71; letter-spacing: 0.1em; text-transform: uppercase; padding: 0 10px; margin-bottom: 4px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 10px; cursor: pointer; text-decoration: none; margin-bottom: 2px; }
  .nav-item:hover { background: rgba(255,255,255,0.06); }
  .nav-item.active { background: #7000FC; }
  .nav-item-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; opacity: 0.5; flex-shrink: 0; }
  .nav-item.active .nav-item-icon { opacity: 1; }
  .nav-item-text { font-size: 13px; color: rgba(255,255,255,0.55); font-weight: 500; }
  .nav-item.active .nav-item-text { color: #fff; }
  .nav-divider { border: none; border-top: 0.5px solid rgba(255,255,255,0.07); margin: 8px 0; }
  .nav-badge { margin-left: auto; background: #DC2626; color: #fff; font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 99px; }
  .sidebar-bottom { margin-top: auto; }
  .sidebar-info { background: rgba(112,0,252,0.15); border-radius: 10px; padding: 10px 12px; border: 0.5px solid rgba(112,0,252,0.3); }
  .sidebar-info-text { font-size: 10px; color: #AAA7B8; line-height: 1.7; margin: 0; }
  .main-wrap { margin-left: 220px; min-height: 100vh; }
  .topbar { background: #fff; border-bottom: 0.5px solid #E4E1EE; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .topbar h1 { font-size: 15px; font-weight: 700; color: #130D2A; margin: 0; }
  .topbar p { font-size: 11px; color: #918DA0; margin: 2px 0 0; }
  .period-btns { display: flex; gap: 4px; }
  .period-btn { border: 0.5px solid #DAD9EA; border-radius: 8px; padding: 6px 12px; font-size: 12px; color: #5E5A71; background: #fff; cursor: pointer; font-weight: 500; }
  .period-btn.active { background: #7000FC; color: #fff; border-color: #7000FC; font-weight: 600; }
  .content { padding: 20px 24px 40px; }
  .stat-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 10px; margin-bottom: 16px; }
  .stat-card { background: #fff; border-radius: 14px; padding: 16px 18px; border: 0.5px solid #E4E1EE; }
  .stat-label { font-size: 11px; color: #918DA0; margin-bottom: 4px; }
  .stat-value { font-size: 26px; font-weight: 700; color: #130D2A; line-height: 1; }
  .stat-change { font-size: 11px; margin-top: 4px; }
  .chart-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 12px; }
  .chart-card { background: #fff; border-radius: 14px; border: 0.5px solid #E4E1EE; padding: 18px 20px; }
  .chart-title { font-size: 13px; font-weight: 600; color: #130D2A; margin-bottom: 16px; }
  .kw-card { background: #fff; border-radius: 14px; border: 0.5px solid #E4E1EE; padding: 18px 20px; }
  .kw-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid #F6F5FF; }
  .kw-row:last-child { border-bottom: none; }
  .kw-rank { font-size: 11px; font-weight: 700; color: #DAD9EA; width: 18px; text-align: right; flex-shrink: 0; }
  .kw-name { font-size: 12px; color: #130D2A; font-weight: 500; flex: 1; }
  .kw-bar-wrap { width: 100px; height: 6px; background: #F0EDF7; border-radius: 3px; overflow: hidden; }
  .kw-bar { height: 100%; background: #7000FC; border-radius: 3px; transition: width 0.5s; }
  .kw-count { font-size: 12px; font-weight: 600; color: #130D2A; width: 36px; text-align: right; }
  .loading { display: flex; align-items: center; justify-content: center; height: 200px; color: #918DA0; font-size: 13px; }
  @media (max-width: 768px) {
    .sidebar { width: 60px; padding: 16px 8px; }
    .logo-title, .nav-item-text, .sidebar-info, .nav-section-label, .logo-sub { display: none; }
    .nav-item { justify-content: center; padding: 10px; }
    .main-wrap { margin-left: 60px; }
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .chart-grid { grid-template-columns: 1fr; }
    .content { padding: 16px; }
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">G</div>
    <div>
      <div class="logo-title">GLN</div>
      <div class="logo-sub">모니터링</div>
    </div>
  </div>
  <div class="nav-section">
    <div class="nav-section-label">메뉴</div>
    <a href="/" class="nav-item">
      <span class="nav-item-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
      <span class="nav-item-text">피드</span>
    </a>
    <a href="/insights" class="nav-item active">
      <span class="nav-item-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span>
      <span class="nav-item-text">인사이트</span>
    </a>
    <a href="#" class="nav-item" style="opacity:0.35;pointer-events:none">
      <span class="nav-item-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg></span>
      <span class="nav-item-text">설정</span>
    </a>
  </div>
  <hr class="nav-divider">
  <div class="nav-section">
    <div class="nav-section-label">빠른 필터</div>
    <a href="/?urgent=1" class="nav-item">
      <span class="nav-item-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></span>
      <span class="nav-item-text">긴급</span>
    </a>
    <a href="/?reply_status=미확인" class="nav-item">
      <span class="nav-item-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
      <span class="nav-item-text">미확인</span>
    </a>
  </div>
  <div class="sidebar-bottom">
    <div class="sidebar-info">
      <p class="sidebar-info-text">외부 공개 글만 수집<br>카페 작성일 미제공<br>답변 초안은 카페 전용</p>
    </div>
  </div>
</div>

<div class="main-wrap">
  <div class="topbar">
    <div>
      <h1>인사이트</h1>
      <p>수집 데이터 기반 트렌드 분석</p>
    </div>
    <div class="period-btns">
      <button class="period-btn" onclick="loadData(1)">오늘</button>
      <button class="period-btn active" onclick="loadData(7)" id="btn-7">7일</button>
      <button class="period-btn" onclick="loadData(30)">30일</button>
      <button class="period-btn" onclick="loadData(90)">전체</button>
    </div>
  </div>

  <div class="content">
    <!-- 요약 통계 -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">총 수집</div>
        <div class="stat-value" id="s-total">-</div>
        <div class="stat-change" style="color:#918DA0" id="s-total-sub">로딩 중...</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">긴급 알림</div>
        <div class="stat-value" id="s-urgent">-</div>
        <div class="stat-change" style="color:#918DA0" id="s-urgent-sub">중요도 7↑ 또는 부정</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">부정 감성</div>
        <div class="stat-value" id="s-negative">-</div>
        <div class="stat-change" id="s-neg-pct" style="color:#918DA0">전체 대비 비율</div>
      </div>
    </div>

    <!-- 차트 -->
    <div class="chart-grid">
      <div class="chart-card">
        <div class="chart-title">일별 언급량 추이</div>
        <canvas id="dailyChart" height="140"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title">감성 분포</div>
        <canvas id="sentimentChart" height="140"></canvas>
      </div>
    </div>

    <!-- 키워드 현황 -->
    <div class="kw-card">
      <div class="chart-title">키워드별 수집 현황</div>
      <div id="kw-list"><div class="loading">로딩 중...</div></div>
    </div>
  </div>
</div>

<script>
let dailyChart = null;
let sentimentChart = null;
let currentDays = 7;

document.querySelectorAll('.period-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
  });
});

async function loadData(days) {
  currentDays = days;
  const res = await fetch('/api/insights?days=' + days);
  const data = await res.json();
  renderStats(data.summary, data.sentiment);
  renderDailyChart(data.daily);
  renderSentimentChart(data.sentiment);
  renderKeywords(data.keywords);
}

function renderStats(summary, sentiment) {
  document.getElementById('s-total').textContent = summary.total.toLocaleString();
  document.getElementById('s-total-sub').textContent = currentDays + '일간 수집';
  document.getElementById('s-urgent').textContent = summary.urgent;
  document.getElementById('s-urgent-sub').textContent = '전체 ' + summary.total + '건 중';
  document.getElementById('s-negative').textContent = summary.negative;
  const pct = summary.total > 0 ? ((summary.negative / summary.total) * 100).toFixed(1) : 0;
  const pctEl = document.getElementById('s-neg-pct');
  pctEl.textContent = '전체의 ' + pct + '%';
  pctEl.style.color = pct > 10 ? '#DC2626' : '#918DA0';
}

function renderDailyChart(daily) {
  const ctx = document.getElementById('dailyChart').getContext('2d');
  if (dailyChart) dailyChart.destroy();
  dailyChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: daily.map(d => d.day.slice(5)),
      datasets: [
        { label: '카페', data: daily.map(d => d.cafe), backgroundColor: 'rgba(112,0,252,0.7)', borderRadius: 4, borderSkipped: false },
        { label: '블로그', data: daily.map(d => d.blog), backgroundColor: 'rgba(53,148,255,0.7)', borderRadius: 4, borderSkipped: false },
        { label: '뉴스', data: daily.map(d => d.news), backgroundColor: 'rgba(5,150,105,0.7)', borderRadius: 4, borderSkipped: false },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 10, padding: 8 } } },
      scales: {
        x: { stacked: true, grid: { display: false }, ticks: { font: { size: 10 }, color: '#918DA0' } },
        y: { stacked: true, grid: { color: '#F0EDF7' }, ticks: { font: { size: 10 }, color: '#918DA0' } }
      }
    }
  });
}

function renderSentimentChart(sentiment) {
  const ctx = document.getElementById('sentimentChart').getContext('2d');
  if (sentimentChart) sentimentChart.destroy();
  const map = { positive: '긍정', neutral: '중립', negative: '부정' };
  const colors = { positive: '#7000FC', neutral: '#DAD9EA', negative: '#DC2626' };
  const labels = sentiment.map(s => map[s.sentiment] || s.sentiment);
  const values = sentiment.map(s => s.cnt);
  const bgColors = sentiment.map(s => colors[s.sentiment] || '#918DA0');
  sentimentChart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data: values, backgroundColor: bgColors, borderWidth: 0, hoverOffset: 4 }] },
    options: {
      responsive: true, maintainAspectRatio: true,
      cutout: '65%',
      plugins: {
        legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 10, padding: 8 } }
      }
    }
  });
}

function renderKeywords(keywords) {
  const max = keywords.length > 0 ? keywords[0].cnt : 1;
  const html = keywords.map((kw, i) => `
    <div class="kw-row">
      <span class="kw-rank">${i + 1}</span>
      <span class="kw-name">${kw.kw}</span>
      <div class="kw-bar-wrap"><div class="kw-bar" style="width:${Math.round(kw.cnt / max * 100)}%"></div></div>
      <span class="kw-count">${kw.cnt}</span>
    </div>
  `).join('');
  document.getElementById('kw-list').innerHTML = html || '<div class="loading">데이터 없음</div>';
}

loadData(7);
</script>
</body>
</html>
