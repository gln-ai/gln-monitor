{% extends 'base.html' %}
{% block title %}서비스현황 대시보드{% endblock %}

{% block page_styles %}
<style>
  /* ── CSS 변수 (v2 JSX 참조 변수 매핑) ─────────────────── */
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    --font-mono: 'SF Mono', 'Menlo', monospace;
    --color-background-primary: #ffffff;
    --color-background-secondary: #F6F5FF;
    --color-background-info: #EFF6FF;
    --color-text-primary: #130D2A;
    --color-text-secondary: #5E5A71;
    --color-text-tertiary: #918DA0;
    --color-text-danger: #DC2626;
    --color-text-success: #059669;
    --color-text-info: #1D4ED8;
    --color-border-tertiary: #E4E1EE;
    --color-border-secondary: #DAD9EA;
    --color-border-danger: #FECACA;
    --color-border-success: #BBF7D0;
    --color-border-info: #BFDBFE;
    --border-radius-lg: 14px;
    --border-radius-md: 10px;
  }

  /* ── 매트릭스 테이블 ────────────────────────────────────── */
  .fc-table-card {
    background: #fff;
    border: 0.5px solid #E4E1EE;
    border-radius: 14px;
    margin-bottom: 1rem;
  }
  .fc-table-wrap { overflow-x: auto; border-radius: 14px 14px 0 0; }
  .fc-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    white-space: nowrap;
    font-family: var(--font-sans);
  }
  .fc-table thead th {
    background: #F6F5FF;
    font-size: 10px;
    font-weight: 700;
    color: #918DA0;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    padding: 10px 10px;
    border-bottom: 0.5px solid #E4E1EE;
    text-align: center;
  }
  .fc-table thead th:first-child {
    text-align: left;
    position: sticky;
    left: 0;
    z-index: 2;
    background: #F6F5FF;
    border-right: 0.5px solid #E4E1EE;
    min-width: 130px;
  }
  .fc-table tbody td {
    padding: 8px 10px;
    border-bottom: 0.5px solid #F0EDF7;
    text-align: center;
    vertical-align: middle;
  }
  .fc-table tbody td:first-child {
    position: sticky;
    left: 0;
    z-index: 1;
    background: #fff;
    text-align: left;
    border-right: 0.5px solid #E4E1EE;
  }
  .fc-table tbody tr:last-child td { border-bottom: none; }
  .fc-table tbody tr:hover td { background: #faf8ff; }
  .fc-table tbody tr:hover td:first-child { background: #f3f0fc; }

  /* 앱 첫 번째 열 */
  .fc-app-cell { display: flex; align-items: center; gap: 8px; }
  .fc-app-name { font-size: 12px; font-weight: 600; color: #130D2A; }

  /* 지원 뱃지 */
  .fc-qr {
    display: inline-flex; align-items: center;
    padding: 1px 7px; border-radius: 99px;
    font-size: 10px; font-weight: 700;
    background: #F0EAFF; color: #7000FC;
  }
  .fc-atm {
    display: inline-flex; align-items: center;
    padding: 1px 7px; border-radius: 99px;
    font-size: 10px; font-weight: 700;
    background: #F0FDF4; color: #059669;
  }
  .fc-both {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .fc-none { color: #DAD9EA; font-size: 15px; line-height: 1; }

  /* 범례 */
  .fc-legend {
    display: flex; gap: 16px; padding: 10px 16px;
    background: #FAFAFA; border-top: 0.5px solid #E4E1EE;
    border-radius: 0 0 14px 14px; flex-wrap: wrap;
  }
  .fc-legend-item {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10.5px; color: #5E5A71;
  }
</style>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
{% endblock %}

{% block topbar_title %}GLN 서비스현황{% endblock %}

function generatePrompt(countries) {
  const active = countries.filter(c => c.active);
  const atmList = active.filter(c => c.atm).map(c => c.name).join(", ");
  const qrList = active.filter(c => c.qr && !c.atm).map(c => c.name).join(", ");
  const inactive = countries.filter(c => !c.active).map(c => c.name);
  return `당신은 GLN 콘텐츠 팩트 체커입니다.\n\nATM 출금 지원국 (${active.filter(c=>c.atm).length}개): ${atmList}\nQR 결제만 지원 (${active.filter(c=>c.qr&&!c.atm).length}개): ${qrList}${inactive.length>0?`\n서비스 중단 (콘텐츠 생산 금지): ${inactive.join(", ")}`:""}\n\n위 ATM 지원국 외 국가에서 ATM 언급 시 RED 판정.`;
}

function Toggle({ on, color, onClick }) {
  return (
    <button
      onClick={onClick}
      aria-pressed={on}
      style={{
        width:28, height:15, borderRadius:99, border:"none", cursor:"pointer",
        background: on ? color : "var(--color-border-secondary)",
        position:"relative", flexShrink:0, transition:"background .15s"
      }}>
      <span style={{
        position:"absolute", top:2, left: on?15:2,
        width:11, height:11, borderRadius:"50%", background:"#fff",
        transition:"left .15s"
      }}/>
    </button>
  );
}

function AppLogo({ icon, name, size=28 }) {
  const src = APP_ICONS[icon];
  if (src) return (
    <img src={src} alt={name} width={size} height={size}
      style={{borderRadius:size*0.22, flexShrink:0, objectFit:"cover"}} />
  );
  const initials = name.slice(0,2);
  return (
    <div style={{
      width:size, height:size, borderRadius:size*0.22,
      background:"var(--color-background-info)",
      display:"flex", alignItems:"center", justifyContent:"center",
      fontSize:size*0.38, fontWeight:500, color:"var(--color-text-info)", flexShrink:0
    }}>{initials}</div>
  );
}

function App() {
  const [countries, setCountries] = useState(COUNTRIES.map(c=>({...c})));
  const [view, setView] = useState("matrix");
  const [newName, setNewName] = useState("");
  const [newAtm, setNewAtm] = useState(false);
  const [copied, setCopied] = useState(false);
  const [showPrompt, setShowPrompt] = useState(false);

  const toggle = useCallback((id, field) => {
    setCountries(prev => prev.map(c => c.id===id ? {...c,[field]:!c[field]} : c));
  }, []);

  const del = useCallback((id) => {
    setCountries(prev => prev.filter(c => c.id!==id));
  }, []);

  const add = () => {
    if (!newName.trim()) return;
    setCountries(prev => [...prev, {id:Date.now(), name:newName.trim(), qr:true, atm:newAtm, active:true}]);
    setNewName(""); setNewAtm(false);
  };

  const copy = () => {
    navigator.clipboard.writeText(generatePrompt(countries)).then(()=>{
      setCopied(true); setTimeout(()=>setCopied(false),2000);
    });
  };

  const active = countries.filter(c=>c.active);
  const atmCnt = active.filter(c=>c.atm).length;
  const qrCnt = active.filter(c=>c.qr&&!c.atm).length;
  const offCnt = countries.filter(c=>!c.active).length;
  const prompt = generatePrompt(countries);

  const tabs = ["앱 매트릭스","국가별 관리","앱 카드"];
  const views = ["matrix","country","card"];

  return (
    <div style={{fontFamily:"var(--font-sans)", paddingBottom:"2rem"}}>

      {/* 요약 */}
      <div style={{display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, marginBottom:"1.25rem"}}>
        {[["전체 국가", countries.length, "var(--color-text-primary)"],
          ["ATM 지원", atmCnt, "#1D9E75"],
          ["QR 전용", qrCnt, "#7F77DD"],
          ["서비스 중단", offCnt, "var(--color-text-danger)"]].map(([l,v,c])=>(
          <div key={l} style={{background:"var(--color-background-secondary)", borderRadius:"var(--border-radius-md)", padding:"10px 14px"}}>

          <button key={t} onClick={()=>setView(views[i])} style={{
            fontSize:12, padding:"5px 14px", cursor:"pointer", border:"none",
            background: view===views[i] ? "var(--color-background-info)" : "none",
            color: view===views[i] ? "var(--color-text-info)" : "var(--color-text-secondary)",
            fontWeight: view===views[i] ? 500 : 400
          }}>{t}</button>
        ))}
      </div>

      {/* 국가별 관리 */}
      {view==="country" && (
        <div>
          <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))", gap:7, marginBottom:"1.25rem"}}>
            {countries.map(c=>(
              <div key={c.id} style={{
                background:"var(--color-background-primary)",
                border:`.5px solid ${c.active?"var(--color-border-tertiary)":"var(--color-border-danger)"}`,
                borderRadius:"var(--border-radius-lg)", padding:"10px 11px",
                opacity: c.active ? 1 : 0.55
              }}>
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8}}>
                  <span style={{fontSize:13, fontWeight:500, color: c.active?"var(--color-text-primary)":"var(--color-text-danger)"}}>{c.name}</span>
                  <button onClick={()=>del(c.id)} style={{border:"none",background:"none",cursor:"pointer",padding:0,fontSize:14,color:"var(--color-text-tertiary)",lineHeight:1}}>
                    <i className="ti ti-x" aria-label={`${c.name} 삭제`}/>
                  </button>
                </div>
                {[["QR결제","#7F77DD","qr"],["ATM출금","#1D9E75","atm"],["서비스중","var(--color-text-success)","active"]].map(([label,color,field])=>(
                  <div key={field} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
                    <span style={{fontSize:11,color:"var(--color-text-secondary)"}}>{label}</span>
                    <Toggle on={c[field]} color={color} onClick={()=>toggle(c.id,field)}/>
                  </div>
                ))}
              </div>
            ))}
          </div>
          <div style={{background:"var(--color-background-secondary)", borderRadius:"var(--border-radius-md)", padding:"12px 16px"}}>
            <div style={{fontSize:11,fontWeight:500,color:"var(--color-text-secondary)",marginBottom:8,textTransform:"uppercase",letterSpacing:".05em"}}>국가 추가</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              <input value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} placeholder="국가명" style={{flex:1,minWidth:80,fontSize:12}}/>
              <label style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"var(--color-text-secondary)",cursor:"pointer"}}>
                <input type="checkbox" checked={newAtm} onChange={e=>setNewAtm(e.target.checked)} style={{width:13,height:13}}/>ATM
              </label>
              <button onClick={add} style={{fontSize:12,padding:"5px 12px"}}>
                <i className="ti ti-plus" aria-hidden="true" style={{marginRight:4}}/>추가
              </button>
            </div>
          </div>
        </div>
      )}

      {/* 앱 매트릭스 */}
      {view==="matrix" && (
        <div>
          <div className="fc-table-card">
            <div className="fc-table-wrap">
              <table className="fc-table">
                <thead>
                  <tr>
                    <th style={{textAlign:"left",minWidth:130}}>앱</th>
                    {active.map(c=>(<th key={c.id}>{c.name}</th>))}
                  </tr>
                </thead>
                <tbody>
                  {APPS.map(app=>(
                    <tr key={app.name}>
                      <td style={{padding:"8px 14px"}}>
                        <div className="fc-app-cell">
                          <AppLogo icon={app.icon} name={app.name} size={24}/>
                          <span className="fc-app-name">{app.name}</span>
                        </div>
                      </td>
                      {active.map(c=>{
                        const hasQ = app.qr.includes(c.name)&&c.qr;
                        const hasA = app.atm.includes(c.name)&&c.atm;
                        return (
                          <td key={c.id}>
                            {hasQ&&hasA
                              ? <div className="fc-both"><span className="fc-qr">QR</span><span className="fc-atm">ATM</span></div>
                              : hasQ ? <span className="fc-qr">QR</span>
                              : hasA ? <span className="fc-atm">ATM</span>
                              : <span className="fc-none">&#x2014;</span>}
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div className="fc-legend">
              <span className="fc-legend-item"><span className="fc-qr">QR</span> QR결제</span>
              <span className="fc-legend-item"><span className="fc-atm">ATM</span> ATM출금</span>
              <span className="fc-legend-item"><span className="fc-qr">QR</span>&nbsp;+&nbsp;<span className="fc-atm">ATM</span> QR+ATM</span>
              <span className="fc-legend-item"><span className="fc-none">&#x2014;</span> 미지원</span>
            </div>
          </div>
        </div>
      )}

      {/* 앱 카드 */}
      {view==="card" && (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8}}>
          {APPS.map(app=>{
            const qrC = active.filter(c=>app.qr.includes(c.name)&&c.qr).length;
            const atmC = active.filter(c=>app.atm.includes(c.name)&&c.atm).length;
            return (
              <div key={app.name} style={{background:"var(--color-background-primary)",border:".5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-lg)",padding:".85rem 1rem"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <AppLogo icon={app.icon} name={app.name} size={30}/>
                    <span style={{fontSize:13,fontWeight:500}}>{app.name}</span>
                  </div>
                  <div style={{display:"flex",gap:5}}>
                    {qrC>0&&<span style={{fontSize:10,padding:"2px 6px",borderRadius:99,background:"#EEEDFE",color:"#3C3489"}}>QR {qrC}</span>}
                    {atmC>0&&<span style={{fontSize:10,padding:"2px 6px",borderRadius:99,background:"#E1F5EE",color:"#085041"}}>ATM {atmC}</span>}
                  </div>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                  {active.map(c=>{
                    const hQ=app.qr.includes(c.name)&&c.qr;
                    const hA=app.atm.includes(c.name)&&c.atm;
                    if(!hQ&&!hA) return null;
                    return (
                      <span key={c.name} style={{fontSize:10,padding:"2px 6px",borderRadius:99,
                        background:hA?"#E1F5EE":"#EEEDFE",
                        border:`.5px solid ${hA?"#5DCAA5":"#AFA9EC"}`,
                        color:hA?"#085041":"#3C3489"
                      }}>{c.name}</span>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* 프롬프트 섹션 */}
      <div style={{border:".5px solid var(--color-border-secondary)",borderRadius:"var(--border-radius-lg)",overflow:"hidden",marginTop:"1.5rem"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",background:"var(--color-background-secondary)",borderBottom:".5px solid var(--color-border-tertiary)"}}>
          <div>
            <span style={{fontSize:13,fontWeight:500}}>시스템 프롬프트</span>
            <span style={{fontSize:11,color:"var(--color-text-tertiary)",marginLeft:8}}>국가 변경 자동 반영</span>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setShowPrompt(v=>!v)} style={{fontSize:12,padding:"4px 10px"}}>{showPrompt?"접기":"미리보기"}</button>
            <button onClick={copy} style={{fontSize:12,padding:"4px 10px",fontWeight:500,color:copied?"var(--color-text-success)":"var(--color-text-info)",border:`.5px solid ${copied?"var(--color-border-success)":"var(--color-border-info)"}`}}>
              <i className={`ti ti-${copied?"check":"copy"}`} aria-hidden="true" style={{marginRight:4}}/>{copied?"복사됨!":"복사"}
            </button>
          </div>
        </div>
        {showPrompt&&(
          <pre style={{margin:0,padding:"12px 16px",fontSize:11,lineHeight:1.7,fontFamily:"var(--font-mono)",color:"var(--color-text-secondary)",background:"var(--color-background-primary)",whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:280,overflowY:"auto"}}>
            {prompt}
          </pre>
        )}
        <div style={{padding:"8px 16px",background:"var(--color-background-secondary)",borderTop:".5px solid var(--color-border-tertiary)",display:"flex",gap:16,flexWrap:"wrap"}}>
          <span style={{fontSize:11,color:"var(--color-text-tertiary)"}}>ATM: <strong style={{color:"var(--color-text-primary)"}}>{countries.filter(c=>c.active&&c.atm).map(c=>c.name).join(", ")||"없음"}</strong></span>
          <span style={{fontSize:11,color:"var(--color-text-tertiary)"}}>QR전용: <strong style={{color:"var(--color-text-primary)"}}>{countries.filter(c=>c.active&&c.qr&&!c.atm).map(c=>c.name).join(", ")||"없음"}</strong></span>
          {offCnt>0&&<span style={{fontSize:11,color:"var(--color-text-danger)"}}>중단: <strong>{countries.filter(c=>!c.active).map(c=>c.name).join(", ")}</strong></span>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
{% endraw %}
{% endblock %}
